version: '3.8'

services:
  db:
    image: mysql:8.0.46
    container_name: pismo_db
    restart: always
    environment:
      MYSQL_DATABASE: PISMO_CHALLENGE
      MYSQL_ROOT_PASSWORD: V1ni6@b06062004
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pV1ni6@b06062004"]
      timeout: 5s
      retries: 10
      interval: 5s

  app:
    build: .
    container_name: pismo_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/PISMO_CHALLENGE
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=V1ni6@b06062004
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
